<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Lista | O Guia Comercial de Conceição do Araguaia</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; max-width: 800px; margin: 0 auto 30px; }
        
        #busca {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            display: block;
            margin: 10px auto;
            outline: none;
        }

        /* Grid de Cards */
        .grid-empresas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: auto;
        }

        /* Estilo do Card com Imagem */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden; /* Garante que a imagem não saia das bordas arredondadas */
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
            border-color: var(--primary);
        }

        .card-img {
            width: 100%;
            height: 140px;
            object-fit: cover; /* Corta a imagem para preencher o espaço sem distorcer */
            background: #f0f0f0;
        }

        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { margin: 5px 0; color: var(--primary); font-size: 1.1em; }
        .card-info p { margin: 2px 0; color: #777; font-size: 0.85em; }

        .contador { color: #888; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Empresas CDA</h1>
        <p class="contador" id="contador">0 empresas cadastradas</p>
        <input type="text" id="busca" placeholder="🔍 Buscar por nome ou setor..." onkeyup="filtrar()">
    </div>

    <div class="grid-empresas" id="lista-grid"></div>

    <script>
        // Dados com o caminho das imagens (Certifique-se que as imagens estão na pasta img/)
        const empresas = [
            { id: 'km-projetos', nome: 'KM PROJETOS', setor: 'Engenharia', foto: 'img/km.jpg' },
            { id: 'mazz', nome: 'MAZZ', setor: 'Educação', foto: 'img/mazz.jpg' },
            { id: 'mr-treinamentos', nome: 'MR TREINAMENTOS', setor: 'Educação', foto: 'img/mr.jpg' },
            { id: 'razgo', nome: 'RAZGO', setor: 'Tecnologia', foto: 'img/razgo.jpg' }
        ];

        const grid = document.getElementById('lista-grid');
        const contadorDiv = document.getElementById('contador');

        function renderizarCards(dados) {
            grid.innerHTML = '';
            
            dados.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(emp => {
                const card = document.createElement('a');
                card.href = `empresa.html?id=${emp.id}`;
                card.className = 'card';
                card.innerHTML = `
                    <img src="${emp.foto}" alt="Logo ${emp.nome}" class="card-img">
                    <div class="card-info">
                        <h3>${emp.nome}</h3>
                        <p>${emp.setor}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            contadorDiv.innerText = `${dados.length} empresas encontradas`;
        }

        function filtrar() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtradas = empresas.filter(emp => 
                emp.nome.toLowerCase().includes(termo) || 
                emp.setor.toLowerCase().includes(termo)
            );
            renderizarCards(filtradas);
        }

        renderizarCards(empresas);
    </script>
</body>
    <footer style="
        margin-top: 50px;
        padding: 30px;
        background: #333;
        color: white;
        text-align: center;
        border-radius: 15px 15px 0 0;
    ">
        <p style="margin: 5px 0;"><strong>CDA Lista Comercial</strong></p>        
        <p style="font-size: 0.9em; color: #bbb;">
            Desenvolvido por: <a href="https://razgo.com.br" target="_blank" style="color: #1a73e8; text-decoration: none; font-weight: bold;">RAZGO</a>
        </p>
        <div style="margin-top: 15px;">
            <a href="https://wa.me/5562996466033" target="_blank" style="color: #25d366; text-decoration: none; font-weight: bold; margin: 0 10px;">
                WhatsApp Suporte
            </a>
        </div>        
        <p style="margin-top: 20px; font-size: 0.8em; color: #888;">&copy; 2026 Todos os direitos reservados.</p>
    </footer>
</html>
