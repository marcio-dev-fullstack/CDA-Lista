<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Lista | O Guia Comercial de Conceição do Araguaia</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text: #333;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        .container { flex: 1; padding: 20px; }

        .header { text-align: center; max-width: 800px; margin: 0 auto 30px; }
        
        #busca {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            display: block;
            margin: 20px auto;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .grid-empresas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card-img-container {
            width: 100%;
            height: 150px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .card-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { margin: 5px 0; color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Empresas CDA</h1>
            <p id="contador" style="color: #888; font-weight: bold;">Carregando empresas...</p>
            <input type="text" id="busca" placeholder="🔍 Buscar empresa..." onkeyup="filtrar()">
        </div>

        <div class="grid-empresas" id="lista-grid"></div>
    </div>

    <footer style="
        margin-top: 50px;
        padding: 30px;
        background: #333;
        color: white;
        text-align: center;
        border-radius: 15px 15px 0 0;
    ">
        <p style="margin: 5px 0;"><strong>CDA Lista Comercial</strong></p>        
        <p style="font-size: 0.9em; color: #bbb;">
            Desenvolvido por: <a href="https://raz.com.br" target="_blank" style="color: #1a73e8; text-decoration: none; font-weight: bold;">RAZGO</a>
        </p>
        <div style="margin-top: 15px;">
            <a href="https://wa.me/5562996466033" target="_blank" style="color: #25d366; text-decoration: none; font-weight: bold; margin: 0 10px;">
                WhatsApp Suporte
            </a>
        </div>        
        <p style="margin-top: 20px; font-size: 0.8em; color: #888;">&copy; 2026 Todos os direitos reservados.</p>
    </footer>

    <script>
        const empresas = [
            { id: 'km-projetos', nome: 'KM PROJETOS', setor: 'Engenharia', foto: 'img/km.jpg' },
            { id: 'mazz', nome: 'MAZZ', setor: 'Educação / Tecnologia', foto: 'img/01.png' },
            { id: 'mr-treinamentos', nome: 'MR TREINAMENTOS', setor: 'Educação', foto: 'img/mr.jpg' },
            { id: 'razgo', nome: 'RAZGO', setor: 'Tecnologia', foto: 'img/razgo.jpg' }
        ];

        function renderizar(dados) {
            const grid = document.getElementById('lista-grid');
            const contador = document.getElementById('contador');
            grid.innerHTML = '';
            
            dados.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(emp => {
                const card = document.createElement('a');
                card.href = `empresa.html?id=${emp.id}`;
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-container">
                        <img src="${emp.foto}" class="card-img" alt="${emp.nome}" 
                             onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'color:#ccc;font-weight:bold\'>LOGO</span>';">
                    </div>
                    <div class="card-info">
                        <h3>${emp.nome}</h3>
                        <p style="font-size: 0.85em; color: #666;">${emp.setor}</p>
                    </div>`;
                grid.appendChild(card);
            });
            contador.innerText = `${dados.length} empresas encontradas`;
        }

        function filtrar() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtradas = empresas.filter(e => e.nome.toLowerCase().includes(termo) || e.setor.toLowerCase().includes(termo));
            renderizar(filtradas);
        }

        renderizar(empresas);
    </script>
</body>
</html>
