<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA-Lista | Guia de Empresas</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --whatsapp-color: #25d366;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin-bottom: 10px; }

        /* Estilo da Barra de Busca */
        .busca-container {
            max-width: 600px;
            margin: 0 auto 40px auto;
            position: relative;
        }

        #inputBusca {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 30px;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #inputBusca:focus { border-color: var(--accent); box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2); }

        .grid-empresas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        .logo-box {
            width: 70px;
            height: 70px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow: hidden;
            border: 2px solid var(--accent);
        }

        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .nome { font-weight: bold; font-size: 1.1em; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        .ramo { color: var(--accent); font-size: 0.9em; font-weight: bold; margin-bottom: 10px; }
        .info { font-size: 0.85em; color: #666; margin: 2px 0; }

        .btn-whatsapp {
            position: fixed; width: 60px; height: 60px; bottom: 40px; right: 40px;
            background-color: var(--whatsapp-color); color: #FFF; border-radius: 50px;
            text-align: center; font-size: 30px; box-shadow: 2px 2px 3px #999;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s;
        }

        footer { margin-top: 50px; text-align: center; padding: 20px; border-top: 1px solid #ddd; color: #666; font-size: 0.9em; }
        footer a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Guia de Empresas - Conceição do Araguaia</h1>
    </header>

    <div class="busca-container">
        <input type="text" id="inputBusca" placeholder="🔍 Buscar por nome ou ramo (ex: tecnologia)..." onkeyup="filtrarEmpresas()">
    </div>

    <div class="grid-empresas" id="lista-empresas"></div>

    <footer>
        <p>© 2026 CDA-Lista - Desenvolvido por: <a href="https://razgo.com.br/" target="_blank">RAZGO</a></p>
    </footer>
</div>

<a href="https://wa.me/5594992500073" class="btn-whatsapp" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35" alt="Zap">
</a>

<script>
    const dados = [
        {n: "RAZGO", r: "Tecnologia", e: "Centro", t: "(94) 991**-****"},
        {n: "MAZZ", r: "Educação", e: "Centro", t: "(94) 991**-****"},
        {n: "MR TREINAMENTOS", r: "Educação", e: "Centro", t: "(94) 991**-****"},
        {n: "KM PROJETOS", r: "Engenharia", e: "Vila Cruzeiro", t: "(94) 991**-****"},
        {n: "Academia Força Viva", r: "Fitness", e: "Av. Frei Gil", t: "(94) 991**-****"},
        {n: "AgroForte Araguaia", r: "Agronegócio", e: "Av. J.K", t: "(94) 991**-****"},
        {n: "Auto Escola Piloto", r: "Educação", e: "Centro", t: "(94) 991**-****"},
        {n: "Boutique Estilo", r: "Vestuário", e: "Av. 7 de Setembro", t: "(94) 991**-****"},
        {n: "Construa CDA", r: "Engenharia", e: "Av. Magalhães Barata", t: "(94) 991**-****"},
        {n: "Drogaria Araguaia", r: "Saúde", e: "Praça da Matriz", t: "(94) 991**-****"},
        {n: "Hotel Rio Araguaia", r: "Hotelaria", e: "Beira Rio", t: "(94) 991**-****"},
        {n: "Imobiliária Norte", r: "Imóveis", e: "Av. J.K", t: "(94) 991**-****"},
        {n: "Informática CDA", r: "Tecnologia", e: "Rua da República", t: "(94) 991**-****"},
        {n: "Lanchonete Burguer", r: "Gastronomia", e: "Praça da Matriz", t: "(94) 991**-****"},
        {n: "Marmoraria Pedrasul", r: "Construção", e: "Setor Industrial", t: "(94) 991**-****"},
        {n: "Oficina do Zé", r: "Mecânica", e: "Setor Tancredo Neves", t: "(94) 991**-****"},
        {n: "Panificadora Central", r: "Alimentos", e: "Centro", t: "(94) 991**-****"},
        {n: "Peixaria do Araguaia", r: "Alimentos", e: "Mercado Municipal", t: "(94) 991**-****"},
        {n: "Pesqueiro Real", r: "Lazer", e: "Beira Rio", t: "(94) 991**-****"},
        {n: "Supermercado Econômico", r: "Varejo", e: "Bairro São Luiz", t: "(94) 991**-****"}
    ];

    // Gerar empresas fictícias para completar 200 itens
    const ramos = ["Comércio", "Serviços", "Indústria", "Beleza", "Transporte"];
    for(let i=1; i<=180; i++) {
        dados.push({
            n: `Empresa Exemplo ${i}`, 
            r: ramos[Math.floor(Math.random() * ramos.length)], 
            e: "Conceição do Araguaia", 
            t: "(94) 991**-****"
        });
    }

    dados.sort((a, b) => a.n.localeCompare(b.n));

    function renderizar(lista) {
    const grid = document.getElementById('lista-empresas');
    grid.innerHTML = "";
    
    // Lista de cores aleatórias para as logos
    const cores = ["2ecc71", "e67e22", "9b59b6", "e74c3c", "1abc9c", "34495e", "f1c40f", "d35400", "27ae60", "2980b9"];

    lista.forEach(emp => {
        // Escolhe uma cor aleatória da lista acima para o fundo da logo
        const corAleatoria = cores[Math.floor(Math.random() * cores.length)];
        
        // Link da logo com a cor sorteada e iniciais brancas
        const logoUrl = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(emp.n)}&backgroundColor=${corAleatoria}&fontFamily=Arial&fontWeight=700&fontColor=ffffff`;
        
        grid.innerHTML += `
            <div class="card">
                <div class="logo-box"><img src="${logoUrl}" alt="Logo"></div>
                <div class="nome">${emp.n}</div>
                <div class="ramo">${emp.r}</div>
                <div class="info">📍 ${emp.e}</div>
                <div class="info">📞 ${emp.t}</div>
            </div>`;
    });
}

    function filtrarEmpresas() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const filtrados = dados.filter(emp => 
            emp.n.toLowerCase().includes(termo) || 
            emp.r.toLowerCase().includes(termo)
        );
        renderizar(filtrados);
    }

    renderizar(dados);
</script>
</body>
</html>
