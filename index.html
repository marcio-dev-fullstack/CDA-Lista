<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Lista | O Guia Comercial</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { flex: 1; text-align: center; }
        #busca { width: 100%; max-width: 400px; padding: 12px; border-radius: 20px; border: 1px solid #ddd; margin: 20px 0; }
        
        .grid-empresas { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        
        .card { background: white; border-radius: 12px; overflow: hidden; text-decoration: none; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        /* Moldura da imagem com cor de fundo caso falte o arquivo */
        .img-box { width: 100%; height: 120px; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; font-weight: bold; }
        .card-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info { padding: 15px; }
        .info h3 { margin: 0; color: var(--primary); font-size: 1.1em; }
        
        footer { margin-top: 40px; padding: 20px; background: #222; color: white; border-radius: 10px; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Empresas CDA</h1>
        <p id="contador">Carregando...</p>
        <input type="text" id="busca" placeholder="🔍 Buscar empresa..." onkeyup="filtrar()">
        <div class="grid-empresas" id="lista-grid"></div>
    </div>

    <footer>
        <p><strong>CDA Lista</strong> | Desenvolvido por <a href="https://raz.com.br" target="_blank">RAZGO</a></p>
    </footer>

    <script>
        const empresas = [
            { id: 'km-projetos', nome: 'KM PROJETOS', setor: 'Engenharia', foto: 'img/km.jpg' },
            { id: 'mazz', nome: 'MAZZ', setor: 'Educação / Tecnologia', foto: 'img/01.png' },
            { id: 'mr-treinamentos', nome: 'MR TREINAMENTOS', setor: 'Educação', foto: 'img/mr.jpg' },
            { id: 'razgo', nome: 'RAZGO', setor: 'Tecnologia', foto: 'img/razgo.jpg' }
        ];

        function renderizar(dados) {
            const grid = document.getElementById('lista-grid');
            grid.innerHTML = '';
            
            dados.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(emp => {
                const item = document.createElement('a');
                item.href = `empresa.html?id=${emp.id}`;
                item.className = 'card';
                item.innerHTML = `
                    <div class="img-box">
                        <img src="${emp.foto}" class="card-img" alt="${emp.nome}" 
                             onerror="this.style.display='none'; this.parentElement.innerHTML='LOGO';">
                    </div>
                    <div class="info">
                        <h3>${emp.nome}</h3>
                        <p style="font-size: 0.8em; color: #777;">${emp.setor}</p>
                    </div>
                `;
                grid.appendChild(item);
            });
            document.getElementById('contador').innerText = `${dados.length} empresas encontradas`;
        }

        function filtrar() {
            const termo = document.getElementById('busca').value.toLowerCase();
            renderizar(empresas.filter(e => e.nome.toLowerCase().includes(termo)));
        }

        renderizar(empresas);
    </script>
</body>
</html>
