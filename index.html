<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDA Lista | O Guia Comercial de Conceição do Araguaia - PA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="img/logo-cda3.jpg" alt="CDA Lista" class="logo-cabecalho" id="main-logo">
        <h1 id="titulo-fallback">CDA LISTA</h1>
        <p><strong>O Guia Comercial de Conceição do Araguaia - PA</strong></p>
    </header>

    <main class="container">
        <div class="busca-wrapper">
            <input type="text" id="inputBusca" placeholder="O que você procura em CDA?" onkeyup="filtrar()">
        </div>

        <div class="categorias-nav-container">
            <div class="categorias-nav">
                <button class="tab-btn active" onclick="filtrarPorCategoria('Todas')">Todas</button>
                <button class="tab-btn tab-btn-fav" onclick="mostrarFavoritos()">⭐ Favoritos</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Praias & Lazer')">🏖️ Praias & Lazer</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Hotéis & Pousadas')">🏨 Hotéis & Pousadas</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Restaurantes')">🍽️ Restaurantes</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Guias de Pesca')">🎣 Guias de Pesca</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Transporte')">🚤 Transporte/Barcos</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Educação')">Educação</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Tecnologia')">Tecnologia</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Engenharia')">Engenharia</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Saúde')">🏥 Saúde</button>
                <button class="tab-btn" onclick="filtrarPorCategoria('Oficina')">🛠️ Oficinas</button>
            </div>
        </div>

        <div id="listaPrincipal" class="grid-container"></div>
    </main>

    <div id="modalDetalhes" class="modal-overlay">
        <div class="modal-box">
            <span class="btn-fechar" id="btnFechar" onclick="fecharModal()">&times;</span>
            <div id="conteudoEmpresa"></div>
        </div>
    </div>

    <a href="https://wa.me/5594992500073" class="btn-zap-flutuante" target="_blank" aria-label="WhatsApp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <footer>
        <div class="container">
            <div class="footer-info">
                <p class="txt-verde-zap"><strong>CDA LISTA</strong></p>
                <p>Conectando o comércio local</p>
                <p>(94) 99250-0073 | Conceição do Araguaia - PA</p>
            </div>
            
            <hr class="linha-divisoria">
            
            <p class="creditos">Desenvolvido por <a href="https://razgo.com.br" target="_blank">RAZGO</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
