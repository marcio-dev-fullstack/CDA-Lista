<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDA-Lista | Guia Comercial de Conceição do Araguaia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo-cda.png" alt="CDA Lista" class="logo-cabecalho" onerror="this.style.display='none'">
        <h1 id="titulo-fallback">CDA-Lista</h1>
        <p>O Guia Comercial de Conceição do Araguaia - PA</p>
    </header>

    <main class="container">
        <div class="busca-wrapper">
            <input type="text" id="inputBusca" placeholder="O que você procura em CDA?" onkeyup="filtrar()">
        </div>

        <div class="categorias-nav">
            <button class="tab-btn active" onclick="filtrarPorCategoria('Todas')">Todas</button>
            <button class="tab-btn tab-btn-fav" onclick="mostrarFavoritos()">⭐ Favoritos</button>
            <button class="tab-btn" onclick="filtrarPorCategoria('Oficina')">Oficinas</button>
            <button class="tab-btn" onclick="filtrarPorCategoria('Marketing')">Marketing</button>
            <button class="tab-btn" onclick="filtrarPorCategoria('Engenharia')">Engenharia</button>
            <button class="tab-btn" onclick="filtrarPorCategoria('TI')">TI/Informática</button>
            <button class="tab-btn" onclick="filtrarPorCategoria('Restaurante')">Restaurantes</button>
            <button class="tab-btn" onclick="filtrarPorCategoria('Hotel')">Hotéis</button>
        </div>

        <div id="listaPrincipal" class="grid-container">
            </div>
    </main>

    <div id="modalDetalhes" class="modal-overlay">
        <div class="modal-box">
            <span class="btn-fechar" id="btnFechar">&times;</span>
            <div id="conteudoEmpresa"></div>
        </div>
    </div>

    <a href="https://wa.me/5594992500073" class="btn-zap-flutuante" target="_blank" aria-label="Falar no WhatsApp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <footer>
        <div class="container">
            <p><strong>CDA Lista</strong> - Conectando o comércio local</p>
            <p>Conceição do Araguaia - PA</p>
            <p>📞 (94) 99250-0073</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
